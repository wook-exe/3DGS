service: 3dgs-viewer
health_check:
  path: /health
  success_rate_threshold: 0.99
  max_p95_latency_ms: 500
  evaluation_window_minutes: 5
rollback:
  strategy: automatic
  trigger: health_check_failed
  target_revision: previous_stable
stages:
  - name: canary-1
    traffic_percent: 1
    minimum_minutes: 5
  - name: canary-10
    traffic_percent: 10
    minimum_minutes: 10
  - name: canary-50
    traffic_percent: 50
    minimum_minutes: 15
  - name: full-rollout
    traffic_percent: 100
    minimum_minutes: 20
