name: 3DGS CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. Lint (코드 스타일 및 문법 검사)
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install flake8
        run: pip install flake8
      - name: Run Linting
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  # 2. Test (Matrix 전략 적용: OS와 버전을 교차 검증)
  test:
    needs: lint  # Lint가 성공해야만 실행됨
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          # if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run Tests
        env:
          PYTHONPATH: . 
        run: pytest

  # 3. Build & Artifact Upload (빌드 및 결과물 업로드)
  build:
    needs: test  # Test가 성공해야만 실행됨
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Build Dummy Artifact (3DGS Engine)
        run: |
          mkdir -p dist
          echo "Compiled 3DGS Engine v1.0" > dist/3dgs-engine.bin
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-artifact
          path: dist/

  # 4. Deploy (결과물 다운로드 및 Secrets 주입 배포)
  deploy:
    needs: build  # Build가 성공해야만 실행됨
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # main 브랜치일 때만 배포 실행
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v8
        with:
          name: build-artifact
          path: dist/
      - name: Verify Downloaded File
        run: cat dist/3dgs-engine.bin
      - name: Deploy to Server
        env:
          # GitHub Secrets에서 안전하게 키 값을 가져옴
          API_TOKEN: ${{ secrets.DEPLOY_API_KEY }}
        run: |
          echo "🚀 Deploying 3DGS Viewer to production server..."
          echo "Authenticating with API_TOKEN: ***HIDDEN***"
          # 실제 배포 스크립트가 들어갈 자리 (예: curl 또는 aws s3 cp)
          echo "✅ Deployment Successful!"