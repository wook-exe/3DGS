name: Packages and Containers

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  NODE_VERSION: "20"
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/3dgs-viewer

jobs:
  npm-package:
    name: Build and publish npm package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: viewer
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://npm.pkg.github.com
          scope: "@wook-exe"
          cache: "npm"
          cache-dependency-path: viewer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run package tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Validate package contents
        run: npm run pack:check

      - name: Publish to GitHub Packages
        if: github.event_name == 'push'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PKG_NAME}@${PKG_VERSION}" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "${PKG_NAME}@${PKG_VERSION} already exists. Skipping publish."
          else
            npm publish
          fi

  docker-image:
    name: Build, smoke-test, and publish Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Build local Docker image
        run: docker build -t 3dgs-viewer:ci .

      - name: Smoke-test local container
        run: |
          docker run --rm -d --name 3dgs-viewer-smoke -p 8000:8000 3dgs-viewer:ci
          trap 'docker stop 3dgs-viewer-smoke' EXIT
          sleep 3
          curl --fail http://127.0.0.1:8000/health
          curl --fail http://127.0.0.1:8000/1.html

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
