name: Cloud Run Container Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION || 'asia-northeast3' }}
  CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE || '3dgs-viewer' }}
  ARTIFACT_REPOSITORY: ${{ vars.GCP_ARTIFACT_REPOSITORY || '3dgs-viewer' }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    if: vars.CLOUD_RUN_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe "${ARTIFACT_REPOSITORY}" \
            --project="${GCP_PROJECT_ID}" \
            --location="${GCP_REGION}" \
          || gcloud artifacts repositories create "${ARTIFACT_REPOSITORY}" \
            --project="${GCP_PROJECT_ID}" \
            --location="${GCP_REGION}" \
            --repository-format=docker \
            --description="3DGS Viewer container images"

      - name: Build and push container image
        run: |
          IMAGE_URI="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REPOSITORY}/${CLOUD_RUN_SERVICE}:${IMAGE_TAG}"
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${CLOUD_RUN_SERVICE}" \
            --image="${IMAGE_URI}" \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --platform=managed \
            --port=8000 \
            --allow-unauthenticated \
            --set-env-vars=APP_ENV=production,APP_VERSION=${IMAGE_TAG}
          SERVICE_URL="$(gcloud run services describe "${CLOUD_RUN_SERVICE}" \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --format='value(status.url)')"
          echo "SERVICE_URL=${SERVICE_URL}" >> "$GITHUB_ENV"

      - name: Health check deployed service
        run: |
          curl --retry 5 --retry-delay 5 --fail "${SERVICE_URL}/health"
          echo "Cloud Run URL: ${SERVICE_URL}"

      - name: Write deployment summary
        run: |
          {
            echo "## Cloud Run deployment"
            echo ""
            echo "- Service: ${CLOUD_RUN_SERVICE}"
            echo "- Region: ${GCP_REGION}"
            echo "- Image: ${IMAGE_URI}"
            echo "- URL: ${SERVICE_URL}"
            echo "- Health: ${SERVICE_URL}/health"
            echo ""
            echo "Monitoring: Cloud Run request logs and metrics are available in Google Cloud Logging and Cloud Monitoring."
          } >> "$GITHUB_STEP_SUMMARY"
