name: DORA Weekly Report Generator

on:
  schedule:
    # 매주 월요일 자정(KST 기준 오전 9시)에 실행
    - cron: '0 0 * * 1'
  workflow_dispatch: # 수동 실행 버튼 활성화

permissions:
  contents: write # 레포지토리에 리포트를 커밋하기 위한 권한

jobs:
  generate_report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Metrics and Generate Data
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // 지난 7일간의 날짜 계산
            const today = new Date();
            const lastWeek = new Date(today);
            lastWeek.setDate(lastWeek.getDate() - 7);
            
            // 1. 임의의 집계 로직 (실제로는 github.rest API를 호출하여 PR/Issue를 가져옴)
            // 여기서는 예시로 집계된 데이터를 생성합니다.
            const reportData = {
              date_range: `${lastWeek.toISOString().split('T')[0]} ~ ${today.toISOString().split('T')[0]}`,
              metrics: {
                deployment_frequency: 5,         // 주간 총 배포 횟수
                lead_time_for_changes: "3.2h",   // 평균 리드 타임
                mean_time_to_restore: "1.5h",    // 평균 복구 시간
                change_failure_rate: "15%"       // 배포 실패율
              },
              timestamp: new Date().toISOString()
            };

            // 폴더가 없으면 생성
            if (!fs.existsSync('data')) fs.mkdirSync('data');
            if (!fs.existsSync('docs')) fs.mkdirSync('docs');

            // 2. JSON 파일 저장
            const jsonPath = 'data/dora-metrics.json';
            fs.writeFileSync(jsonPath, JSON.stringify(reportData, null, 2));
            console.log(`✅ JSON saved to ${jsonPath}`);

            // 3. Markdown 리포트 생성
            const mdPath = 'docs/dora-weekly-report.md';
            const mdContent = `
            # 📊 Weekly DORA Metrics Report
            **Period:** ${reportData.date_range}
            
            ## 🚀 Performance Metrics
            | Metric | Value | Description |
            |--------|-------|-------------|
            | **Deployment Frequency** | ${reportData.metrics.deployment_frequency} times | 지난주 총 배포 횟수 |
            | **Lead Time for Changes** | ${reportData.metrics.lead_time_for_changes} | 커밋부터 배포까지 평균 소요 시간 |
            | **Mean Time To Restore** | ${reportData.metrics.mean_time_to_restore} | 장애 발생 시 평균 복구 시간 |
            | **Change Failure Rate** | ${reportData.metrics.change_failure_rate} | 배포 중 결함 발생 비율 |

            *Report automatically generated by GitHub Actions at ${reportData.timestamp}*
            `.trim().replace(/^ +/gm, ''); // 들여쓰기 제거
            
            fs.writeFileSync(mdPath, mdContent);
            console.log(`✅ Markdown report saved to ${mdPath}`);

      # 생성된 JSON 파일을 GitHub 아티팩트로 업로드 (다운로드 보관용)
      - name: Upload JSON Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dora-metrics-artifact
          path: data/dora-metrics.json
          retention-days: 30 # 아티팩트 보관 기간 (30일)

      # 생성된 JSON과 Markdown 파일을 레포지토리에 자동 커밋
      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/dora-metrics.json docs/dora-weekly-report.md
          
          # 변경사항이 있을 경우에만 커밋
          if ! git diff --staged --quiet; then
            git commit -m "chore: auto-generate weekly DORA metrics report"
            git push
          else
            echo "No changes to commit."
          fi