version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/viewer"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    groups:
      npm-production:
        dependency-type: "production"
      npm-development:
        dependency-type: "development"
    commit-message:
      prefix: "deps(npm)"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:15"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    groups:
      python-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "deps(python)"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Asia/Seoul"
    commit-message:
      prefix: "deps(docker)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:45"
      timezone: "Asia/Seoul"
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "deps(actions)"
